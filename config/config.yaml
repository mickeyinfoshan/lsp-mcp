# MCP-LSP Bridge Service Configuration

# LSP server configuration mapping
# Maps language IDs to corresponding LSP server configurations
lsp_servers:
  # Go language server configuration
  go:
    command: "gopls"
    args: ["serve"]
    initialization_options: {}
    env:
      GOPATH: "~/go"
      GOBIN: "~/go/bin"
      GO111MODULE: "on"
      GOPLSDEBUG: "all"
    
  # TypeScript/JavaScript language server configuration
  typescript:
    command: "typescript-language-server"
    args: ["--stdio"]
    initialization_options: {}
    env: {}
    
  javascript:
    command: "typescript-language-server"
    args: ["--stdio"]
    initialization_options: {}
    env: {}
    
  # Python language server configuration
  python:
    command: "pylsp"
    args: []
    initialization_options: {}
    env: {}

# MCP server configuration
mcp_server:
  # Server name
  name: "lsp-bridge"
  # Server version
  version: "1.0.0"
  # Server description
  description: "MCP-LSP Bridge Service for providing LSP capabilities through MCP protocol"

# Logging configuration
logging:
  # Log level: debug, info, warn, error
  level: "debug"
  # Log output format: json, text
  format: "json"
  # Whether to output to file
  file_output: true
  # Log file path (used when file_output is true)
  file_path: "./logs/mcp-lsp-bridge.log"

# Session management configuration
session:
  # Session timeout (seconds)
  timeout: 300
  # Maximum concurrent sessions
  max_sessions: 100
  # Session cleanup interval (seconds)
  cleanup_interval: 60