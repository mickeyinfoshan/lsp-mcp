# MCP-LSP Bridge Service Configuration

# LSP服务器配置映射
# 将语言ID映射到对应的LSP服务器配置
lsp_servers:
  # Go语言服务器配置
  go:
    command: "gopls"
    args: ["serve"]
    initialization_options: {}
    env:
      GOPATH: "~/go"
      GOBIN: "~/go/bin"
      GO111MODULE: "on"
      GOPLSDEBUG: "all"
    
  # TypeScript/JavaScript语言服务器配置
  typescript:
    command: "typescript-language-server"
    args: ["--stdio"]
    initialization_options: {}
    env: {}
    
  javascript:
    command: "typescript-language-server"
    args: ["--stdio"]
    initialization_options: {}
    env: {}
    
  # Python语言服务器配置
  python:
    command: "pylsp"
    args: []
    initialization_options: {}
    env: {}

# MCP服务器配置
mcp_server:
  # 服务器名称
  name: "lsp-bridge"
  # 服务器版本
  version: "1.0.0"
  # 服务器描述
  description: "MCP-LSP Bridge Service for providing LSP capabilities through MCP protocol"

# 日志配置
logging:
  # 日志级别: debug, info, warn, error
  level: "debug"
  # 日志输出格式: json, text
  format: "json"
  # 是否输出到文件
  file_output: true
  # 日志文件路径（当file_output为true时使用）
  file_path: "./logs/mcp-lsp-bridge.log"

# 会话管理配置
session:
  # 会话超时时间（秒）
  timeout: 300
  # 最大并发会话数
  max_sessions: 100
  # 会话清理间隔（秒）
  cleanup_interval: 60